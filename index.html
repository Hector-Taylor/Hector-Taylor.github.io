<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hector Taylor</title>
    <meta
      name="description"
      content="Hector Taylor's personal site: procedural art, research, synthetic psychedelia, and experimental interfaces."
    />
    <link rel="canonical" href="https://hectortayl.org/" />
    <meta property="og:title" content="Hector Taylor" />
    <meta
      property="og:description"
      content="Procedural art, research, synthetic psychedelia, and experimental interfaces."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hectortayl.org/" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" type="image/svg+xml" href="vite.svg" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,700&family=Space+Grotesk:wght@300;400&display=swap');

      :root {
        color-scheme: only light;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        color: #f4f1ec;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      #shader-web-background {
        z-index: 0 !important;
      }

      .shader-web-background-fallback {
        background: white;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
      }

      .overlay {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: clamp(20px, 4vw, 56px);
        letter-spacing: 0.02em;
      }

      .overlay__top,
      .overlay__bottom {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
      }

      .overlay__name {
        font-family: 'Bodoni Moda', serif;
        font-size: clamp(32px, 5vw, 72px);
        font-weight: 700;
        line-height: 0.95;
        text-transform: uppercase;
        color: rgba(22, 21, 26, 0.78);
        text-shadow:
          0 1px 1px rgba(255, 255, 255, 0.72),
          0 12px 30px rgba(255, 255, 255, 0.38);
      }

      .overlay__name span {
        display: block;
      }

      .overlay__location {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(12px, 1.6vw, 18px);
        text-transform: uppercase;
        letter-spacing: 0.28em;
        color: rgba(20, 18, 28, 0.78);
        text-shadow:
          0 1px 1px rgba(255, 255, 255, 0.66),
          0 0 18px rgba(255, 255, 255, 0.7);
      }

      @media (max-width: 720px) {
        .overlay__top,
        .overlay__bottom {
          flex-direction: column;
          gap: 16px;
          align-items: flex-start;
        }

        .overlay__location {
          letter-spacing: 0.2em;
        }
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <div class="overlay__top">
        <div class="overlay__name">
          <span>Hector</span>
          <span>Taylor</span>
        </div>
        <div class="overlay__location">Zürich</div>
      </div>
    </div>

    <script src="assets/shader-web-background.min.js"></script>

    <script type="x-shader/x-fragment" id="Image">
      precision highp float;

      uniform vec2  iResolution;
      uniform float iTime;

      const vec2 DEMO_SIZE = vec2(320.0, 240.0);

      vec3 palette(float index, float paletteIndex) {
        float rFreq = 0.1;
        float gFreq = 0.1;
        float bFreq = 0.1;
        float rPhase = 0.0;
        float gPhase = 2.0;
        float bPhase = 4.0;

        if (paletteIndex > 0.5 && paletteIndex < 1.5) {
          rFreq = 0.05;
          gFreq = 0.1;
          bFreq = 0.08;
          gPhase = 0.0;
          bPhase = 0.0;
        } else if (paletteIndex > 1.5 && paletteIndex < 2.5) {
          rFreq = 0.08;
          gFreq = 0.05;
          bFreq = 0.1;
          rPhase = 4.0;
          bPhase = 0.0;
        } else if (paletteIndex > 2.5) {
          rFreq = 0.1;
          gFreq = 0.08;
          bFreq = 0.05;
        }

        return vec3(
          sin(rFreq * index + rPhase) * 0.5 + 0.5,
          sin(gFreq * index + gPhase) * 0.5 + 0.5,
          sin(bFreq * index + bPhase) * 0.5 + 0.5
        );
      }

      vec3 plasmaColor(float colorIndex, float time) {
        float cycle = floor(time / 15.0);
        float segmentTime = mod(time, 15.0);
        float activePalette = mod(cycle, 4.0);
        float nextPalette = mod(activePalette + 1.0, 4.0);
        float fade = smoothstep(12.0, 15.0, segmentTime);

        vec3 oldColor = palette(colorIndex, activePalette);
        vec3 newColor = palette(colorIndex, nextPalette);
        return mix(oldColor, newColor, fade);
      }

      vec2 demoPixel(vec2 fragCoord) {
        float coverScale = max(iResolution.x / DEMO_SIZE.x, iResolution.y / DEMO_SIZE.y);
        vec2 coveredSize = DEMO_SIZE * coverScale;
        vec2 coveredCoord = fragCoord - (iResolution - coveredSize) * 0.5;
        return floor(coveredCoord / coverScale);
      }

      void mainImage(out vec4 fragColor, in vec2 fragCoord) {
        vec2 p = demoPixel(fragCoord);

        float speedGovernor = max(iTime, 150.0);
        float speed = 0.7 + sin(speedGovernor * 0.5) * 0.2;
        float t = speedGovernor * speed;

        float value =
          sin(p.x / 16.0 + t) +
          sin(p.y / 8.0 + t) +
          sin((p.x + p.y) / 16.0 + t) +
          sin(length(p) / 8.0 + t);

        float baseIndex = floor(128.0 + 64.0 * value);
        float cycleOffset = floor(iTime * 33.0);
        float colorIndex = mod(baseIndex + cycleOffset, 256.0);
        vec3 color = plasmaColor(colorIndex, iTime);

        fragColor = vec4(color, 1.0);
      }

      void main() {
        mainImage(gl_FragColor, gl_FragCoord.xy);
      }
    </script>

    <script>
      shaderWebBackground.shade({
        shaders: {
          Image: {
            uniforms: {
              iResolution: (gl, loc, ctx) => gl.uniform2f(loc, ctx.width, ctx.height),
              iTime:       (gl, loc) => gl.uniform1f(loc, performance.now() / 1000),
            }
          }
        }
      });
    </script>
  </body>
</html>
